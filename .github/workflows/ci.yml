name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [develop]

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: npm install --frozen-lockfile
      - run: npm run lint
      - run: npm run build

  e2e:
    name: Cypress E2E
    runs-on: ubuntu-latest
    needs: lint-build
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --frozen-lockfile
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          install: false
          build: npm run build
          start: npm run dev
          wait-on: "http://localhost:3001"
          wait-on-timeout: 120
          browser: chrome
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
