name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [develop]

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm" # Ativa cache automático de node_modules

      # npm ci é o comando correto para ambientes de CI (usa o package-lock.json estrito)
      - run: npm ci 
      - run: npm run lint
      - run: npm run build

  e2e:
    name: Cypress E2E
    runs-on: ubuntu-latest
    needs: lint-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          install: false
          build: npm run build
          start: npm run preview
          wait-on: "http://localhost:3001"
          wait-on-timeout: 120
          browser: chrome

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore